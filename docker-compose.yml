version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: skillswap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skillswap_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - skillswap_data:/var/lib/postgresql/data

volumes:
  skillswap_data:

spring:
  application:
    name: skill-swap-hub

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skillswap_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope: openid, profile, email

server:
  port: ${SERVER_PORT:8080}

# ── JWT Configuration ──
app:
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days
  google:
    client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}

# ── SpringDoc / Swagger ──
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health, info
